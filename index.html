<!DOCTYPE html>
<html lang="pt-br"> 
<head>
<meta charset="UTF-8">
<title>HULW/UFPB/EBSERH - Competitividade</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
/* === ESTILO ORIGINAL PRESERVADO === */
body{
font-family:Arial;
margin:0;
background:#f4f6f5;
}

.institucional{
text-align:center;
background:white;
padding:15px 10px 5px 10px;
border-bottom:3px solid #8CC63F;
}

.inst1{font-weight:bold;font-size:18px;color:#444;}
.inst2{font-size:16px;color:#444;font-weight:bold;}
.inst3{font-size:14px;color:#444;font-weight:bold;margin-bottom:5px;}

.header{
background:#8CC63F;
padding:20px;
text-align:center;
font-size:24px;
font-weight:bold;
color:#444;
}

.container{padding:20px;}

.graficos{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-top:30px;
}

.grafico-card{
background:white;
padding:15px;
border-radius:6px;
box-shadow:0 0 6px rgba(0,0,0,0.06);
}

.grafico-card h3{
margin-top:0;
font-size:14px;
text-align:center;
}
</style>
</head>

<body>

<div class="container">

<table id="dataTable"></table>

<!-- GRÁFICOS -->
<div class="graficos">

<div class="grafico-card">
<h3>Fornecedores por Porte (ME/EPP)</h3>
<canvas id="graficoPorte"></canvas>
</div>

<div class="grafico-card">
<h3>Tendência de Registros no Período</h3>
<canvas id="graficoTendencia"></canvas>
</div>

</div>

</div>

<script>

let chartPorte
let chartLinha

function updateCharts(data){

let me=3
let epp=1

let labels=["01/03/2025","02/03/2025","03/03/2025"]
let valores=[1,2,3]

/* === GRÁFICO DE BARRAS (VERDE / SEM GRID) === */

if(chartPorte) chartPorte.destroy()

chartPorte = new Chart(
document.getElementById("graficoPorte"),
{
type:"bar",
data:{
labels:["ME","EPP"],
datasets:[{
label:"Quantidade",
data:[me,epp],
backgroundColor:["#8CC63F","#2E7D32"],
borderColor:["#558B2F","#1B5E20"],
borderWidth:1
}]
},
options:{
responsive:true,
plugins:{legend:{display:false}},
scales:{
x:{
grid:{display:false},
border:{display:false}
},
y:{
grid:{display:false},
border:{display:false},
ticks:{beginAtZero:true}
}
}
}
}
)

/* === GRÁFICO DE LINHA (VERDE / SEM GRID) === */

if(chartLinha) chartLinha.destroy()

chartLinha = new Chart(
document.getElementById("graficoTendencia"),
{
type:"line",
data:{
labels:labels,
datasets:[{
label:"Registros",
data:valores,
borderColor:"#2E7D32",
backgroundColor:"#A5D6A7",
fill:false,
tension:0.3,
pointBackgroundColor:"#1B5E20",
pointBorderColor:"#1B5E20",
pointRadius:4
}]
},
options:{
responsive:true,
scales:{
x:{
grid:{display:false},
border:{display:false}
},
y:{
grid:{display:false},
border:{display:false},
ticks:{beginAtZero:true}
}
}
}
}
)

}

updateCharts([])

</script>

</body>
</html>
