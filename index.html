<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<title>Painel de Competitividade</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6f5;
}

.institucional{
text-align:center;
background:white;
padding:15px;
}

.header{
background:#8CC63F;
padding:20px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.container{
padding:20px;
}

.filtros{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:10px;
background:white;
padding:15px;
border-radius:6px;
margin-bottom:20px;
}

input{
padding:6px;
border:1px solid #ccc;
border-radius:4px;
}

button{
padding:8px 12px;
border:none;
border-radius:4px;
cursor:pointer;
font-weight:bold;
}

.btn-aplicar{background:#8CC63F;color:white}
.btn-limpar{background:#c00000;color:white}
.btn-exportar{background:#444;color:white}
.btn-imprimir{background:#4285F4;color:white}

.indicadores{
display:flex;
gap:10px;
margin-bottom:20px;
}

.card{
flex:1;
background:white;
padding:15px;
border-left:6px solid #8CC63F;
border-radius:6px;
text-align:center;
}

.card p{
font-size:22px;
font-weight:bold;
margin:5px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
font-size:12px;
}

th,td{
border:1px solid #ddd;
padding:6px;
}

th{
background:#8CC63F;
color:white;
}

.graficos{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-top:30px;
}

.grafico-card{
background:white;
padding:15px;
border-radius:6px;
}

</style>

</head>

<body>

<div class="institucional">
<b>HOSPITAL UNIVERSITÁRIO LAURO WANDERLEY</b><br>
UNIVERSIDADE FEDERAL DA PARAÍBA<br>
EMPRESA BRASILEIRA DE SERVIÇOS HOSPITALARES
</div>

<div class="header">
PAINEL DE ANÁLISE DE COMPETITIVIDADE
</div>

<div class="container">

<div class="filtros">

<input id="ufFilter" placeholder="UF">
<input id="modalidadeFilter" placeholder="Modalidade">
<input type="date" id="dataInicial">
<input type="date" id="dataFinal">
<input id="catmatFilter" placeholder="Catmat/Catser">

</div>

<button class="btn-aplicar" onclick="applyFilters()">Aplicar Filtros</button>
<button class="btn-limpar" onclick="clearFilters()">Limpar</button>
<button class="btn-exportar" onclick="downloadCSV()">Baixar CSV</button>
<button class="btn-imprimir" onclick="window.print()">Imprimir</button>

<br><br>

<div class="indicadores">

<div class="card">
Total de Compras
<p id="totalCompras">0</p>
</div>

<div class="card">
Quantidade de Fornecedores
<p id="totalCNPJs">0</p>
</div>

<div class="card">
Período
<p id="periodo">-</p>
</div>

</div>

<table id="dataTable">
<thead></thead>
<tbody></tbody>
</table>

<div class="graficos">

<div class="grafico-card">
<h3>Fornecedores por Porte (ME/EPP)</h3>
<canvas id="graficoPorte"></canvas>
</div>

<div class="grafico-card">
<h3>Tendência de Registros no Período</h3>
<canvas id="graficoTendencia"></canvas>
</div>

</div>

</div>

<script>

let originalData=[]
let filteredData=[]

let chartPorte
let chartLinha

const csvURL="https://docs.google.com/spreadsheets/d/e/2PACX-1vSAMPLE/pub?output=csv"

/* CARREGAR CSV */

Papa.parse(csvURL,{
download:true,
header:true,
complete:function(results){

originalData=results.data.map(r=>{

r.DataObj=new Date(r["Data"])

return r

})

filteredData=[...originalData]

renderTable(filteredData)
updateCards(filteredData)
updateCharts(filteredData)

}

})

/* TABELA */

function renderTable(data){

let table=document.getElementById("dataTable")

let thead=table.querySelector("thead")
let tbody=table.querySelector("tbody")

thead.innerHTML=""
tbody.innerHTML=""

if(data.length==0)return

let headers=Object.keys(data[0])

let headRow="<tr>"
headers.forEach(h=>headRow+="<th>"+h+"</th>")
headRow+="</tr>"

thead.innerHTML=headRow

data.slice(0,1000).forEach(r=>{

let row="<tr>"

headers.forEach(h=>{

row+="<td>"+(r[h]||"")+"</td>"

})

row+="</tr>"

tbody.innerHTML+=row

})

}

/* CARDS */

function updateCards(data){

document.getElementById("totalCompras").innerText=data.length

let fornecedores=[...new Set(data.map(r=>r.CNPJ))]

document.getElementById("totalCNPJs").innerText=fornecedores.length

if(data.length>0){

let datas=data.map(r=>r.DataObj)

let min=new Date(Math.min(...datas))
let max=new Date(Math.max(...datas))

document.getElementById("periodo").innerText=
min.toLocaleDateString()+" - "+max.toLocaleDateString()

}

}

/* FILTROS */

function applyFilters(){

let uf=document.getElementById("ufFilter").value.toUpperCase()

filteredData=originalData.filter(r=>{

return !uf || (r.UF||"").toUpperCase().includes(uf)

})

renderTable(filteredData)
updateCards(filteredData)
updateCharts(filteredData)

}

function clearFilters(){

document.querySelectorAll("input").forEach(i=>i.value="")

filteredData=[...originalData]

renderTable(filteredData)
updateCards(filteredData)
updateCharts(filteredData)

}

/* CSV DOWNLOAD */

function downloadCSV(){

let csv=Papa.unparse(filteredData)

let blob=new Blob([csv])

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="dados.csv"

a.click()

}

/* GRÁFICOS */

function updateCharts(data){

let me=0
let epp=0

data.forEach(r=>{

let porte=(r.Porte||"").toUpperCase()

if(porte=="ME")me++
if(porte=="EPP")epp++

})

let datas={}

data.forEach(r=>{

let d=r.DataObj.toLocaleDateString()

if(!datas[d])datas[d]=0

datas[d]++

})

let labels=Object.keys(datas)
let valores=Object.values(datas)

if(chartPorte)chartPorte.destroy()

chartPorte=new Chart(
document.getElementById("graficoPorte"),
{
type:"bar",
data:{
labels:["ME","EPP"],
datasets:[{
data:[me,epp],
backgroundColor:["#8CC63F","#444"]
}]
},
options:{
plugins:{legend:{display:false}},
scales:{
x:{grid:{display:false}},
y:{grid:{display:false}}
}
}
})

if(chartLinha)chartLinha.destroy()

chartLinha=new Chart(
document.getElementById("graficoTendencia"),
{
type:"line",
data:{
labels:labels,
datasets:[{
data:valores,
borderColor:"#8CC63F",
backgroundColor:"#8CC63F",
tension:0.3
}]
},
options:{
plugins:{legend:{display:false}},
scales:{
x:{grid:{display:false}},
y:{grid:{display:false}}
}
}
})

}

</script>

</body>
</html>
