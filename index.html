<!-- (código completo mantido, apenas JS ajustado) -->
<script>

let originalData=[]
let filteredData=[]
let sortDirection=1

let chartPorte=null
let chartLinha=null

// 🔥 NOVO CONTROLE GLOBAL
let mesSelecionadoAtual = null
let porteSelecionadoAtual = null

const googleSheetCSV="https://docs.google.com/spreadsheets/d/e/2PACX-1vTQH6JfKGvaPplebHWWPH_6GLvWTc_Fr6Jx5VoAhwqgAnfAPGKnlMhtM8AzJcalvA/pub?gid=1616332808&single=true&output=csv"

// 🔥 FUNÇÃO GLOBAL DE FILTROS
function aplicarFiltrosGlobais(){

let dados = originalData

if(mesSelecionadoAtual){
dados = dados.filter(r=>{
if(!r["DataObj"]) return false
let d=r["DataObj"]
let mes = String(d.getMonth()+1).padStart(2,"0")
let ano = d.getFullYear().toString().slice(2)
return (mes + "/" + ano) === mesSelecionadoAtual
})
}

if(porteSelecionadoAtual){
dados = dados.filter(r=>{
return (r["Porte"]||"").toUpperCase() === porteSelecionadoAtual
})
}

renderTable(dados)
updateCharts(dados)

document.getElementById("contador").innerText =
dados.length + " registros (filtros aplicados)"

}

// ================================
// UPDATE CHARTS
// ================================
function updateCharts(data){

if(chartPorte){chartPorte.destroy()}
if(chartLinha){chartLinha.destroy()}

if(data.length===0) return

let me=0
let epp=0

data.forEach(r=>{
let porte=(r["Porte"]||"").toUpperCase()
if(porte==="ME") me++
if(porte==="EPP") epp++
})

// 🔥 AGRUPAMENTO MENSAL
let fornecedoresPorMes = {}

data.forEach(r=>{
if(!r["DataObj"]) return

let d = r["DataObj"]
let mes = String(d.getMonth()+1).padStart(2,"0")
let ano = d.getFullYear().toString().slice(2)

let chave = mes + "/" + ano

let cnpj=(r["CNPJ"]||"").replace(/\D/g,"")

if(!fornecedoresPorMes[chave]){
fornecedoresPorMes[chave] = { cnpjs:new Set() }
}

if(cnpj){
fornecedoresPorMes[chave].cnpjs.add(cnpj)
}
})

let labels = Object.keys(fornecedoresPorMes).sort((a,b)=>{
let [ma,ya]=a.split("/")
let [mb,yb]=b.split("/")
return new Date("20"+ya,ma-1) - new Date("20"+yb,mb-1)
})

let valores = labels.map(l=>fornecedoresPorMes[l].cnpjs.size)

// ================================
// GRÁFICO PORTE
// ================================
chartPorte=new Chart(document.getElementById("graficoPorte"),{
type:"bar",
data:{
labels:["ME","EPP"],
datasets:[{
data:[me,epp],
backgroundColor:["#8CC63F","#444"]
}]
},
options:{
plugins:{legend:{display:false}},
onClick:function(evt,elements){

if(elements.length>0){

let index=elements[0].index
let porte=index===0?"ME":"EPP"

// toggle
if(porteSelecionadoAtual===porte){
porteSelecionadoAtual=null
}else{
porteSelecionadoAtual=porte
}

aplicarFiltrosGlobais()

}
}
}
})

// ================================
// GRÁFICO TENDÊNCIA
// ================================
chartLinha=new Chart(document.getElementById("graficoTendencia"),{
type:"line",
data:{
labels:labels,
datasets:[{
label:"Fornecedores",
data:valores,
borderColor:"#8CC63F",
backgroundColor:"#8CC63F",
tension:0.2
}]
},
options:{
plugins:{legend:{display:true}},
onClick:function(evt,elements){

if(elements.length>0){

let index=elements[0].index
let mes=labels[index]

// toggle
if(mesSelecionadoAtual===mes){
mesSelecionadoAtual=null
}else{
mesSelecionadoAtual=mes
}

aplicarFiltrosGlobais()

}
}
}
})

}

</script>
