<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Painel EBSERH - Competitividade</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6f5;
}

.header{
background:#8CC63F;
padding:20px;
text-align:center;
font-size:24px;
font-weight:bold;
color:#444;
}

.container{
padding:20px;
}

.filtros{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:15px;
margin-bottom:20px;
background:white;
padding:15px;
border-radius:8px;
box-shadow:0 0 8px rgba(0,0,0,0.08);
}

label{
font-size:12px;
font-weight:bold;
}

input{
width:100%;
padding:6px;
border:1px solid #ccc;
border-radius:4px;
}

button{
padding:8px 12px;
border:none;
border-radius:4px;
cursor:pointer;
font-weight:bold;
}

.btn-aplicar{background:#8CC63F;color:white;}
.btn-limpar{background:#C00000;color:white;}
.btn-exportar{background:#444;color:white;}
.btn-imprimir{background:#8CC63F;color:white;}

.indicadores{
display:flex;
gap:15px;
margin-bottom:20px;
}

.card{
flex:1;
background:white;
border-left:6px solid #8CC63F;
padding:15px;
border-radius:6px;
box-shadow:0 0 6px rgba(0,0,0,0.06);
text-align:center;
}

.card h3{
margin:0;
font-size:14px;
}

.card p{
font-size:22px;
font-weight:bold;
margin-top:5px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
font-size:12px;
}

th,td{
border:1px solid #ddd;
padding:6px;
text-align:left;
}

th{
background:#8CC63F;
color:white;
}

#contador{
font-weight:bold;
margin-bottom:10px;
}

</style>
</head>

<body>

<div class="header">
PAINEL DE ANÁLISE DE COMPETITIVIDADE
</div>

<div class="container">

<div class="filtros">

<div>
<label>UF</label>
<input type="text" id="ufFilter">
</div>

<div>
<label>Modalidade</label>
<input type="text" id="modalidadeFilter">
</div>

<div>
<label>Data Inicial</label>
<input type="date" id="dataInicial">
</div>

<div>
<label>Data Final</label>
<input type="date" id="dataFinal">
</div>

<div>
<label>Catmat/Catser</label>
<input type="text" id="catmatFilter">
</div>

</div>

<div style="margin-bottom:15px;">

<button class="btn-aplicar" onclick="applyFilters()">Aplicar Filtros</button>

<button class="btn-limpar" onclick="clearFilters()">Limpar</button>

<button class="btn-exportar" onclick="downloadCSV()">Baixar CSV</button>

<button class="btn-imprimir" onclick="window.print()">Imprimir</button>

</div>

<div class="indicadores">

<div class="card">
<h3>Total de Compras</h3>
<p id="totalCompras">0</p>
</div>

<div class="card">
<h3>Quantidade de Fornecedores</h3>
<p id="totalCNPJs">0</p>
</div>

<div class="card">
<h3>Período</h3>
<p id="periodo">-</p>
</div>

</div>

<div id="contador"></div>

<table id="dataTable">
<thead></thead>
<tbody></tbody>
</table>

</div>

<script>

let originalData=[]
let filteredData=[]

const googleSheetCSV="https://docs.google.com/spreadsheets/d/e/2PACX-1vTQH6JfKGvaPplebHWWPH_6GLvWTc_Fr6Jx5VoAhwqgAnfAPGKnlMhtM8AzJcalvA/pub?gid=1616332808&single=true&output=csv"

window.onload=function(){

fetch(googleSheetCSV)

.then(res=>res.text())

.then(text=>{

Papa.parse(text,{

header:true,

skipEmptyLines:true,

complete:function(results){

originalData=results.data

filteredData=[...originalData]

updateDashboard(filteredData)

}

})

})

}

function updateDashboard(data){

renderTable(data)

updateCards(data)

}

function renderTable(data){

const thead=document.querySelector("#dataTable thead")
const tbody=document.querySelector("#dataTable tbody")

thead.innerHTML=""
tbody.innerHTML=""

if(data.length===0){

document.getElementById("contador").innerText="0 registros encontrados"

return

}

const headers=Object.keys(data[0])

let headerRow="<tr>"

headers.forEach(h=>headerRow+=`<th>${h}</th>`)

headerRow+="</tr>"

thead.innerHTML=headerRow

let html=""

data.forEach(row=>{

let tr="<tr>"

headers.forEach(h=>{

tr+=`<td>${row[h] || ""}</td>`

})

tr+="</tr>"

html+=tr

})

tbody.innerHTML=html

document.getElementById("contador").innerText=data.length+" registros encontrados"

}

function parseDateBR(data){

if(!data) return null

let p=data.split("/")

return new Date(p[2],p[1]-1,p[0])

}

function updateCards(data){

document.getElementById("totalCompras").innerText=data.length

let cnpjs=new Set()

data.forEach(r=>{

let cnpj=(r["CNPJ"]||"").replace(/\D/g,"")

if(cnpj) cnpjs.add(cnpj)

})

document.getElementById("totalCNPJs").innerText=cnpjs.size

let datas=data.map(r=>parseDateBR(r["Data da Homologação"])).filter(d=>d)

if(datas.length>0){

datas.sort((a,b)=>a-b)

document.getElementById("periodo").innerText=

datas[0].toLocaleDateString()+" a "+datas[datas.length-1].toLocaleDateString()

}

}

function applyFilters(){

const uf=document.getElementById("ufFilter").value.toLowerCase()

const mod=document.getElementById("modalidadeFilter").value.toLowerCase()

const catmat=document.getElementById("catmatFilter").value.toLowerCase()

const dataIni=document.getElementById("dataInicial").value

const dataFim=document.getElementById("dataFinal").value

filteredData=originalData.filter(r=>{

const dataHom=parseDateBR(r["Data da Homologação"])

let inicio=dataIni?new Date(dataIni):null

let fim=dataFim?new Date(dataFim):null

return(

(!uf||(r["UF"]||"").toLowerCase().includes(uf)) &&

(!mod||(r["Modalidade"]||"").toLowerCase().includes(mod)) &&

(!catmat||(r["Catmat/Catser"]||"").toLowerCase().includes(catmat)) &&

(!inicio||(dataHom && dataHom>=inicio)) &&

(!fim||(dataHom && dataHom<=fim))

)

})

updateDashboard(filteredData)

}

function clearFilters(){

document.querySelectorAll("input").forEach(i=>i.value="")

filteredData=[...originalData]

updateDashboard(filteredData)

}

function downloadCSV(){

if(filteredData.length===0) return

const headers=Object.keys(filteredData[0])

let csv=headers.join(";")+"\n"

filteredData.forEach(r=>{

csv+=headers.map(h=>r[h]||"").join(";")+"\n"

})

const blob=new Blob([csv],{type:"text/csv"})

const url=URL.createObjectURL(blob)

const a=document.createElement("a")

a.href=url

a.download="dados_filtrados.csv"

a.click()

}

</script>

</body>
</html>
