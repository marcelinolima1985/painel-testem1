<!DOCTYPE html>

<html lang="pt-br"> 
<head>
<meta charset="UTF-8">
<title>HULW/UFPB/HUBRASIL - Competitividade</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Arial;margin:0;background:#f4f6f5;}
.institucional{text-align:center;background:white;padding:15px 10px 5px 10px;border-bottom:3px solid #8CC63F;}
.inst1{font-weight:bold;font-size:18px;color:#444;}
.inst2{font-size:16px;color:#444;font-weight:bold;}
.inst3{font-size:14px;color:#444;font-weight:bold;margin-bottom:5px;}
.header{background:#8CC63F;padding:20px;text-align:center;font-size:24px;font-weight:bold;color:#444;}
.container{padding:20px;}
.filtros{display:grid;grid-template-columns:repeat(6,1fr);gap:20px;margin-bottom:20px;background:white;padding:15px;border-radius:8px;box-shadow:0 0 8px rgba(0,0,0,0.08);}
label{font-size:12px;font-weight:bold;}
input{width:100%;padding:6px;border:1px solid #ccc;border-radius:4px;}
button{padding:8px 12px;border:none;border-radius:4px;cursor:pointer;font-weight:bold;}
.btn-aplicar{background:#8CC63F;color:white;}
.btn-limpar{background:#C00000;color:white;}
.btn-exportar{background:#444;color:white;}
.btn-imprimir{background:#4285F4;color:white;}
.indicadores{display:flex;gap:15px;margin-bottom:20px;}
.card{flex:1;background:white;border-left:6px solid #8CC63F;padding:15px;border-radius:6px;box-shadow:0 0 6px rgba(0,0,0,0.06);text-align:center;}
.card h3{margin:0;font-size:14px;}
.card p{font-size:22px;font-weight:bold;margin-top:5px;}
table{width:100%;border-collapse:collapse;background:white;font-size:12px;}
th,td{border:1px solid #ddd;padding:6px;text-align:left;}
th{background:#8CC63F;color:white;cursor:pointer;}
#contador{font-weight:bold;margin-top:10px;margin-bottom:10px;}
.graficos{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:30px;}
.grafico-card{background:white;padding:15px;border-radius:6px;box-shadow:0 0 6px rgba(0,0,0,0.06);}
.grafico-card h3{text-align:center;}
</style>

</head>

<body>

<div class="institucional">
<div class="inst1">HOSPITAL UNIVERSITÁRIO LAURO WANDERLEY</div>
<div class="inst2">UNIVERSIDADE FEDERAL DA PARAÍBA</div>
<div class="inst3">EMPRESA BRASILEIRA DE SERVIÇOS HOSPITALARES</div>
</div>

<div class="header">PAINEL DE ANÁLISE DE COMPETITIVIDADE</div>

<div class="container">

<button class="btn-aplicar" onclick="applyFilters()">Aplicar Filtros</button>

<div id="contador"></div>

<table id="dataTable">
<thead></thead>
<tbody></tbody>
</table>

<div class="graficos">

<div class="grafico-card">
<h3>Fornecedores por Porte (ME/EPP)</h3>
<canvas id="graficoPorte"></canvas>
</div>

<div class="grafico-card">
<h3>Tendência de Fornecedores no Período</h3>
<canvas id="graficoTendencia"></canvas>
</div>

</div>

</div>

<script>

let originalData=[]
let filteredData=[]
let chartPorte=null
let chartLinha=null

// 🔥 CONTROLE GLOBAL
let mesSelecionadoAtual=null
let porteSelecionadoAtual=null

const googleSheetCSV="https://docs.google.com/spreadsheets/d/e/2PACX-1vTQH6JfKGvaPplebHWWPH_6GLvWTc_Fr6Jx5VoAhwqgAnfAPGKnlMhtM8AzJcalvA/pub?gid=1616332808&single=true&output=csv"

// ================= LOAD =================
function applyFilters(){

fetch(googleSheetCSV)
.then(res=>res.text())
.then(text=>{

Papa.parse(text,{
header:true,
skipEmptyLines:true,
complete:function(results){

originalData=results.data

originalData.forEach(r=>{
if(r["Data da Homologação"]){
let p=r["Data da Homologação"].split("/")
r["DataObj"]=new Date(p[2],p[1]-1,p[0])
}
})

renderTable(originalData)
updateCharts(originalData)

}
})

})

}

// ================= FILTRO GLOBAL =================
function aplicarFiltrosGlobais(){

let dados=originalData

if(mesSelecionadoAtual){
dados=dados.filter(r=>{
let d=r.DataObj
if(!d) return false
let m=String(d.getMonth()+1).padStart(2,"0")
let a=d.getFullYear().toString().slice(2)
return (m+"/"+a)===mesSelecionadoAtual
})
}

if(porteSelecionadoAtual){
dados=dados.filter(r=>(r.Porte||"").toUpperCase()===porteSelecionadoAtual)
}

renderTable(dados)
updateCharts(dados)

document.getElementById("contador").innerText=dados.length+" registros"

}

// ================= TABELA =================
function renderTable(data){

let thead=document.querySelector("#dataTable thead")
let tbody=document.querySelector("#dataTable tbody")

thead.innerHTML=""
tbody.innerHTML=""

if(data.length===0) return

let headers=Object.keys(data[0]).filter(h=>h!=="DataObj")

let tr="<tr>"
headers.forEach(h=>tr+="<th>"+h+"</th>")
tr+="</tr>"

thead.innerHTML=tr

let html=""
data.forEach(r=>{
let row="<tr>"
headers.forEach(h=>{
let v=r[h]
if(h==="Data da Homologação" && r.DataObj){
v=r.DataObj.toLocaleDateString("pt-BR")
}
row+="<td>"+(v||"")+"</td>"
})
row+="</tr>"
html+=row
})

tbody.innerHTML=html

}

// ================= CHARTS =================
function updateCharts(data){

if(chartPorte) chartPorte.destroy()
if(chartLinha) chartLinha.destroy()

let me=0,epp=0

data.forEach(r=>{
let p=(r.Porte||"").toUpperCase()
if(p==="ME") me++
if(p==="EPP") epp++
})

// AGRUPAMENTO MENSAL
let map={}
data.forEach(r=>{
let d=r.DataObj
if(!d) return
let m=String(d.getMonth()+1).padStart(2,"0")
let a=d.getFullYear().toString().slice(2)
let k=m+"/"+a
if(!map[k]) map[k]=new Set()
map[k].add((r.CNPJ||""))
})

let labels=Object.keys(map).sort((a,b)=>{
let [ma,ya]=a.split("/")
let [mb,yb]=b.split("/")
return new Date("20"+ya,ma-1)-new Date("20"+yb,mb-1)
})

let valores=labels.map(l=>map[l].size)

// PORTE
chartPorte=new Chart(document.getElementById("graficoPorte"),{
type:"bar",
data:{labels:["ME","EPP"],datasets:[{data:[me,epp],backgroundColor:["#8CC63F","#444"]}]},
options:{
plugins:{legend:{display:false}},
onClick:(e,el)=>{
if(el.length){
let p=el[0].index===0?"ME":"EPP"
porteSelecionadoAtual=(porteSelecionadoAtual===p?null:p)
aplicarFiltrosGlobais()
}
}
}
})

// TENDÊNCIA
chartLinha=new Chart(document.getElementById("graficoTendencia"),{
type:"line",
data:{labels:labels,datasets:[{label:"Fornecedores",data:valores,borderColor:"#8CC63F",backgroundColor:"#8CC63F",tension:0.2}]},
options:{
plugins:{legend:{display:true}},
onClick:(e,el)=>{
if(el.length){
let m=labels[el[0].index]
mesSelecionadoAtual=(mesSelecionadoAtual===m?null:m)
aplicarFiltrosGlobais()
}
}
}
})

}

</script>

</body>
</html>
